<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin User - Ultimate Defensive Driving School</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="fonts/css/all.min.css">
    <style>
        .admin-create-container {
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
        }
        .admin-create-container h2 {
            text-align: center;
            margin-bottom: 24px;
            color: var(--primary-color);
        }
        .secret-key {
            font-family: monospace;
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-create-container">
            <h2><i class="fas fa-user-shield"></i> Create Admin User</h2>
            
            <div class="warning">
                <strong>Warning:</strong> This page is for creating administrator accounts only. Use the secret key below.
            </div>
            
            <form id="admin-form" onsubmit="handleAdminCreate(event)">
                <div class="form-group">
                    <label for="full-name">Full Name *</label>
                    <input type="text" id="full-name" name="full_name" required placeholder="Enter admin full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="Enter admin email">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter phone number">
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Create admin password">
                </div>
                
                <div class="form-group">
                    <label for="admin-key">Admin Secret Key *</label>
                    <input type="text" id="admin-key" name="admin_key" class="secret-key" required placeholder="Enter admin secret key">
                    <small style="color: var(--text-light);">Secret key: udds_admin_secret_2024</small>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large">
                    <i class="fas fa-user-plus"></i>
                    Create Admin
                </button>
            </form>
            
            <div id="message" style="margin-top: 20px; text-align: center;"></div>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <script>
        async function handleAdminCreate(e) {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            const messageDiv = document.getElementById('message');
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            submitBtn.disabled = true;
            messageDiv.innerHTML = '';
            
            try {
                const formData = {
                    full_name: form.full_name.value,
                    email: form.email.value,
                    phone: form.phone.value,
                    password: form.password.value,
                    admin_key: form.admin_key.value
                };
                
                const response = await fetch('/api/auth/create-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert alert-success">Admin created successfully! <a href="login.html">Login here</a></div>';
                    form.reset();
                } else {
                    messageDiv.innerHTML = '<div class="alert alert-danger">' + data.error + '</div>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
