# Render.com deployment configuration for Ultimate Defensive Driving School

services:
  - type: docker
    name: ultimate-defensive-school
    region: oregon
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ultimate-defensive-school-db
          property: internalConnectionString
      - key: DB_USER
        fromDatabase:
          name: ultimate-defensive-school-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ultimate-defensive-school-db
          property: password

databases:
  - name: ultimate-defensive-school-db
    plan: free
