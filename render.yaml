# Render.com deployment configuration for Ultimate Defensive Driving School

services:
  - type: web
    name: ultimate-defensive-school
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ultimate-defensive-school
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: ultimate-defensive-school
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ultimate-defensive-school
          property: password

databases:
  - name: ultimate-defensive-school
    databaseName: udds
    user: udds
    plan: free
